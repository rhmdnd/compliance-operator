profiles:
- description: |-
    A test profile containing CEL-based rules for end-to-end testing
    of the CEL scanner pipeline.
  id: cel_e2e_test_profile
  name: cel-e2e-test-profile
  productType: Platform
  rules:
  - check-default-namespace-has-no-pods
  - check-namespaces-have-network-policies
  - check-no-privileged-containers
  title: CEL E2E Test Profile
rules:
- checkType: Platform
  controls:
    CIS-OCP:
    - 5.7.4
    NIST-800-53:
    - AC-6
    - CM-7
  description: |-
    The default namespace should be kept empty and not used for running
    application workloads. Running pods in the default namespace bypasses
    RBAC policies that may be scoped to specific namespaces and reduces
    the security posture of the cluster.
  expression: |
    pods.items.filter(p,
        p.metadata.namespace == 'default' &&
        !p.metadata.name.startsWith('kubernetes')
    ).size() == 0
  failureReason: Application pods are running in the default namespace.
  id: check_default_namespace_has_no_pods
  inputs:
  - kubernetesInputSpec:
      apiVersion: v1
      resource: pods
      resourceNamespace: default
    name: pods
  instructions: |-
    Run 'oc get pods -n default' and verify that no application pods
    are present. Only the 'kubernetes' service should exist.
  name: check-default-namespace-has-no-pods
  rationale: |-
    Using the default namespace for workloads circumvents namespace-based
    access controls and network policies.
  severity: medium
  title: Default namespace must not contain application pods
- checkType: Platform
  controls:
    CIS-OCP:
    - 5.3.2
    NIST-800-53:
    - SC-7
    - SC-7(5)
  description: |-
    All user-created namespaces should have at least one NetworkPolicy
    defined to control ingress and egress traffic. Namespaces without
    network policies allow unrestricted pod-to-pod communication.
  expression: |
    namespaces.items.all(ns,
        ns.metadata.name.startsWith('kube-') ||
        ns.metadata.name == 'default' ||
        ns.metadata.name.startsWith('openshift') ||
        networkpolicies.items.exists(np,
            np.metadata.namespace == ns.metadata.name
        )
    )
  failureReason: One or more user namespaces do not have a NetworkPolicy defined.
  id: check_namespaces_have_network_policies
  inputs:
  - kubernetesInputSpec:
      apiVersion: v1
      resource: namespaces
    name: namespaces
  - kubernetesInputSpec:
      apiVersion: v1
      group: networking.k8s.io
      resource: networkpolicies
    name: networkpolicies
  instructions: |-
    For each user namespace run 'oc get networkpolicies -n <namespace>'
    and verify that at least one NetworkPolicy exists.
  name: check-namespaces-have-network-policies
  rationale: |-
    Without network policies, any pod can communicate with any other
    pod in the cluster, increasing the blast radius of a compromise.
  severity: medium
  title: Namespaces must have network policies
- checkType: Platform
  controls:
    CIS-OCP:
    - 5.2.1
    NIST-800-53:
    - AC-6(1)
    - AC-6(5)
  description: |-
    Privileged containers have full access to the host's devices and
    kernel capabilities. No container should run in privileged mode
    unless absolutely necessary and explicitly approved.
  expression: |
    pods.items.all(pod,
        pod.spec.containers.all(container,
            !has(container.securityContext) ||
            !has(container.securityContext.privileged) ||
            container.securityContext.privileged == false
        )
    )
  failureReason: One or more containers are running in privileged mode.
  id: check_no_privileged_containers
  inputs:
  - kubernetesInputSpec:
      apiVersion: v1
      resource: pods
    name: pods
  instructions: |-
    Run 'oc get pods -A -o json | jq '.items[] | select(.spec.containers[]
    .securityContext.privileged==true) | .metadata.name'' and review
    each privileged container.
  name: check-no-privileged-containers
  rationale: |-
    Privileged containers can escape container isolation and compromise
    the entire node.
  severity: high
  title: Containers must not run in privileged mode
